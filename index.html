<div id="splash-screen">
        <div class="splash-content">
            <h2 style="margin: 0; color: #333;">Welcome</h2>
            
            <video src="Live_Avatar_Demo.mp4" class="splash-video" autoplay loop muted playsinline></video>
            
            <div style="text-align: left; width: 100%;">
                <label style="font-size: 14px; font-weight: bold; color: #333;">Transcript</label>
                <textarea class="splash-input" style="height: 80px; resize: vertical; margin-top: 5px; background-color: #f9f9f9;" readonly>Temporary Transcript</textarea>
            </div>
            
            <input type="text" id="v_name" class="splash-input" placeholder="Full Name">
            <input type="email" id="v_email" class="splash-input" placeholder="Email">
            <input type="text" id="v_vzid" class="splash-input" placeholder="VZID">
            
            <div style="display: flex; gap: 10px; width: 100%;">
                <button onclick="handleRegisterBtn()" style="background-color: #28a745;">Register</button>
                <button onclick="closeSplashBtn()">Go</button>
            </div>
        </div>
    </div>
